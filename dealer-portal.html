<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дилерський портал — КОМПУТЕРРА</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="dealer-portal-page">
  <div class="site-shell">
    <header class="site-header">
      <div class="container inner">
        <a class="brand" href="dealer-portal.html">
          <img src="assets/logo.png" alt="КОМПУТЕРРА">
          <div class="brand-copy">
            <span class="kicker">КОМПУТЕРРА</span>
            <span class="page-title">Дилерський портал</span>
          </div>
        </a>
        <div class="header-actions">
          <div class="dealer-chip" data-dealer-name>Дилер</div>
          <button class="header-login-btn" type="button" data-dealer-logout>Вийти</button>
          <button class="burger-btn" type="button" data-menu-toggle aria-label="Відкрити меню" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </header>

    <div class="mobile-menu" data-mobile-menu>
      <div class="mobile-menu-panel">
        <a class="mobile-menu-link" href="dealer-portal.html">Каталог дилера</a>
        <a class="mobile-menu-link" href="index.html">Роздрібний сайт</a>
        <a class="mobile-menu-link" href="#" data-mobile-logout>Вийти</a>
      </div>
    </div>

    <main>
      <section class="toolbar" style="padding-top:18px">
        <div class="container">
          <div class="search-box">
            <input data-search type="search" placeholder="Пошук за назвою, брендом або моделлю">
          </div>
        </div>
      </section>

      <section class="categories-wrap">
        <div class="container">
          <div class="category-strip" data-categories></div>
        </div>
      </section>

      <section class="catalog">
        <div class="container">
          <div class="meta-row">
            <h2>Каталог дилера</h2>
            <div class="meta-muted" data-count></div>
          </div>
          <p class="sync-note" data-sync-note></p>

          <table class="catalog-table dealer-table">
            <thead>
              <tr>
                <th>Категорія</th>
                <th>Назва та модель</th>
                <th>Характеристики</th>
                <th>Роздрібна ціна</th>
                <th>Ціна дилера</th>
                <th>Наявність</th>
              </tr>
            </thead>
            <tbody data-catalog-body></tbody>
          </table>

          <div class="mobile-list" data-mobile-list></div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/dealer-auth.js"></script>
  <script src="assets/dealer-portal.js"></script>
</body>
</html>
