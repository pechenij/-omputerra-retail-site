<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід дилера — КОМПУТЕРРА</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="dealer-auth-page">
  <main class="admin-shell">
    <div class="container admin-login">
      <div class="panel-card" style="max-width:520px;margin:0 auto">
        <a class="brand" href="index.html" style="margin-bottom:22px">
          <img src="assets/logo.png" alt="КОМПУТЕРРА">
          <div class="brand-copy">
            <span class="kicker">Окремий вхід</span>
            <span class="page-title">Дилерський портал</span>
          </div>
        </a>
        <form name="dealerLoginForm" class="form-stack">
          <label><span>Логін</span><input type="text" name="login" required autocomplete="username"></label>
          <label><span>Пароль</span><input type="password" name="password" required autocomplete="current-password"></label>
          <button class="btn primary" type="submit">Увійти</button>
        </form>
        <p class="note" data-dealer-login-feedback style="margin-top:14px">Використай логін і пароль, які тобі видав адміністратор.</p>
      </div>
    </div>
  </main>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/dealer-auth.js"></script>
  <script src="assets/dealer-login.js"></script>
</body>
</html>
